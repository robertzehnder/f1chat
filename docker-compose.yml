version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: openf1-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-openf1}
      POSTGRES_USER: ${DB_USER:-openf1}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openf1_local_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openf1} -d ${DB_NAME:-openf1}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
